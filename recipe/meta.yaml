{% set name = "suds-community" %}
{% set version = "1.2.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/suds_community-{{ version }}.tar.gz
  sha256: ab3b24dc9ba06b5e6598e2a5d34d2a7d06c79e613d81cedc028475bfbd3bb90c

build:
  number: 0
  noarch: python
  script:
    - sed -i.bak 's|import setup|import setup, find_namespace_packages|' setup.py
    - sed -i.bak 's|recursive_package_list("suds")|find_namespace_packages(where="suds")|' setup.py
    - rm -rf *.bak
    - {{ PYTHON }} -m pip install . --no-deps --no-build-isolation --no-cache-dir --use-pep517 -vvv

requirements:
  host:
    - python >=3.7
    - pip
    - setuptools
  run:
    - python >=3.7

test:
  imports:
    - suds
    - suds.bindings

about:
  home: "https://github.com/suds-community/suds"
  summary: "Lightweight SOAP client (community fork)."
  license: "LGPL-3.0-only"
  license_file: "LICENSE.txt"
  description: |
    Suds is a lightweight SOAP python client for consuming Web Services. 
    A community fork of the jurko fork.
  doc_url: "https://github.com/suds-community/suds"
  dev_url: "https://github.com/suds-community/suds"

extra:
  recipe-maintainers:
    - emiliom
